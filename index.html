<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiply — Times Table Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOME SCREEN -->
  <section id="home" class="active">
    <h1>Multiply!</h1>
    <p class="subtitle">Times Table Trainer</p>

    <div class="stats-row">
      <div class="stat-box">
        <span class="stat-label">Daily Streak</span>
        <span class="stat-value" id="daily-streak">0 🔥</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Personal Best</span>
        <span class="stat-value" id="personal-best">0 ⭐</span>
      </div>
    </div>

    <div class="timer-selector">
      <label>Practice Time</label>
      <div class="timer-buttons" id="timer-buttons">
        <button data-minutes="1">1 min</button>
        <button data-minutes="2">2 min</button>
        <button data-minutes="3">3 min</button>
        <button data-minutes="5" class="selected">5 min</button>
        <button data-minutes="10">10 min</button>
      </div>
    </div>

    <button id="start-btn" class="primary-btn">Start Practice</button>

    <div class="progress-section">
      <h2>Progress</h2>
      <table id="progress-grid"></table>
    </div>
  </section>

  <!-- PRACTICE SCREEN -->
  <section id="practice">
    <div class="practice-header">
      <span id="timer-display">5:00</span>
      <span id="streak-display">0 🔥</span>
    </div>

    <div id="problem-display" class="problem">7 × 8</div>

    <div class="answer-area">
      <input type="number" id="answer-input" inputmode="numeric" autocomplete="off" placeholder="?">
      <button id="submit-btn" class="primary-btn">Go</button>
    </div>

    <div id="feedback" class="feedback"></div>
    <div id="session-score" class="session-score">0 correct</div>
  </section>

  <!-- SUMMARY SCREEN -->
  <section id="summary">
    <h1>Session Complete!</h1>

    <div class="summary-stats">
      <div class="stat-box big">
        <span class="stat-value" id="summary-correct">0</span>
        <span class="stat-label">Correct</span>
      </div>
      <div class="stat-box big">
        <span class="stat-value" id="summary-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-box big">
        <span class="stat-value" id="summary-accuracy">0%</span>
        <span class="stat-label">Accuracy</span>
      </div>
    </div>

    <div id="summary-message" class="summary-message"></div>

    <div id="weak-spots" class="weak-spots">
      <h2>Keep Practicing</h2>
      <ul id="weak-list"></ul>
    </div>

    <div class="summary-buttons">
      <button id="restart-btn" class="primary-btn">Practice Again</button>
      <button id="home-btn" class="secondary-btn">Back Home</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
